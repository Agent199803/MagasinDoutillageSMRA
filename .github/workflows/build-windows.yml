name: Build Windows Installer

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python requirements
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed --name MagasinSMRA app.py

      - name: Install Inno Setup
        run: |
          choco install innosetup -y

      - name: Create Installer Script
        shell: pwsh
        run: |
          @"
          [Setup]
          AppName=Magasin D'outillage SMRA
          AppVersion=1.0
          DefaultDirName={pf}\MagasinSMRA
          DefaultGroupName=MagasinSMRA
          OutputDir=installer
          OutputBaseFilename=MagasinSMRA_Setup
          Compression=lzma
          SolidCompression=yes
          WizardStyle=modern

          [Files]
          Source: "dist\MagasinSMRA.exe"; DestDir: "{app}"; Flags: ignoreversion

          [Icons]
          Name: "{group}\Magasin SMRA"; Filename: "{app}\MagasinSMRA.exe"
          Name: "{commondesktop}\Magasin SMRA"; Filename: "{app}\MagasinSMRA.exe"

          [Run]
          Filename: "{app}\MagasinSMRA.exe"; Description: "Launch Magasin SMRA"; Flags: nowait postinstall skipifsilent
          "@ | Out-File -Encoding ASCII setup.iss

      - name: Build Installer
        run: |
          iscc setup.iss

      - name: Upload Installer
        uses: actions/upload-artifact@v4
        with:
          name: MagasinSMRA-Installer
          path: installer/MagasinSMRA_Setup.exe
