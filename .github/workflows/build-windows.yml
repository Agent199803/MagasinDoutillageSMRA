name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: windows-2019

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.8"
          architecture: "x86"

      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - run: |
          pyinstaller --onefile --windowed --name MagasinSMRA app.py

      - uses: actions/upload-artifact@v4
        with:
          name: MagasinSMRA-EXE
          path: dist/MagasinSMRA.exe
